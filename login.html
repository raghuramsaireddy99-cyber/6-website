<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Skilline</title>

  <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/skilline.css">

  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-cream min-h-screen flex items-center justify-center">

  <div class="bg-white shadow-2xl rounded-3xl overflow-hidden flex flex-col md:flex-row max-w-5xl w-full">

    <!-- Left -->
    <div class="md:w-1/2 bg-yellow-500 text-white p-12 flex flex-col justify-center">

      <h1 class="text-5xl font-bold mb-6">
        Welcome Back
      </h1>

      <p class="text-lg leading-relaxed">
        Login to continue learning with Skilline and access your courses.
      </p>

    </div>

    <!-- Right -->
    <div class="md:w-1/2 p-12">

      <h2 class="text-4xl font-bold text-darken mb-8">
        Login
      </h2>

      <form class="space-y-6">

        <div>
          <label class="block mb-2 text-gray-600">Email</label>

          <input 
            type="email"
            placeholder="Enter your email"
            class="w-full border border-gray-300 rounded-xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-yellow-500"
          >
        </div>

        <div>
          <label class="block mb-2 text-gray-600">Password</label>

          <input 
            type="password"
            placeholder="Enter your password"
            class="w-full border border-gray-300 rounded-xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-yellow-500"
          >
        </div>

        <button 
          class="w-full bg-yellow-500 text-white py-4 rounded-xl text-lg font-semibold hover:opacity-90 transition"
        >
          Login
        </button>

      </form>

      <p class="text-gray-500 mt-6 text-center">
        Don't have an account?
        <a href="#" class="text-yellow-500 font-semibold">
          Sign Up
        </a>
      </p>

    </div>

  </div>

</body>
</html>
